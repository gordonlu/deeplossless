# ACES scenario: hidden_bug (Codex variant)
#
# Mirror of hidden_bug.yaml adapted for the OpenAI Codex CLI. The
# differences from the Chat Completions default:
#
#   - Reads use Codex's native `shell` tool with `cat <path>` (Codex
#     does not expose `Read` / `Edit` as function tools; shell + apply_patch
#     are the only built-in file-I/O surfaces). The mock's event matcher
#     recognises `shell` + `cat` and classifies it as a Read event so
#     the scenario's on_read transitions still fire on the path.
#   - Edits use `apply_patch` (Codex's typed file-edit tool) with the
#     args nested under `operation`: { type: "update_file", path, diff }.
#     The `diff` is a unified-diff chunk (no --- / +++ headers needed).
#   - There is no fallback `args:` block: this YAML is codex-only.
#     Running it under --agent-format openai / claude_code will produce
#     an empty tool args object, which is the correct refusal.
#
# Drive with:
#   deeplossless --torture-aces hidden_bug.codex --agent-format codex
#
# Sibling files:
#   hidden_bug.yaml            — Chat Completions / OpenAI default
#   hidden_bug.claude_code.yaml — Claude Code (Read/Edit snake_case)
name: hidden_bug
description: "Agent must investigate and fix a timeout config bug across multiple files (Codex variant)"
start: reading
vfs:
  files:
    src/config.sh: |
      #!/bin/bash
      # Network client configuration
      TIMEOUT_DEFAULT=30
      MAX_RETRIES=3
      RETRY_DELAY=2

      log() {
        echo "[$(date -Iseconds)] $*"
      }
    src/network.sh: |
      #!/bin/bash
      # Network operations with timeout enforcement
      source "$(dirname "$0")/config.sh"

      send_request() {
        local url="$1"
        local timeout="${TIMEOUT_DEFAULT}"

        if [ "$timeout" -lt 60 ]; then
          log "ERROR: TIMEOUT_DEFAULT must be >= 60 (got $timeout)"
          return 1
        fi

        log "Sending request to $url (timeout=${timeout}s)"
        return 0
      }
    src/client.sh: |
      #!/bin/bash
      # High-level client that orchestrates network calls
      source "$(dirname "$0")/config.sh"
      source "$(dirname "$0")/network.sh"

      fetch() {
        local path="$1"
        local url="https://api.example.com${path}"

        if ! send_request "$url"; then
          log "fetch failed"
          exit 1
        fi
        log "fetched $path"
      }

      fetch "$1"

states:
  reading:
    assistant: "Investigate the timeout configuration. Read src/config.sh to see current values."
    tool_calls:
      - shell
    args_per_agent:
      codex:
        shell:
          command: "cat ${VFS}/src/config.sh"
    transitions:
      - type: on_read
        pattern: "config.sh"
        next: still_reading
      - type: on_tool
        tool: ""
        next: still_reading

  still_reading:
    assistant: "config.sh has TIMEOUT_DEFAULT=30. Check how it's USED in network.sh and client.sh — the constraint isn't here, it's enforced at the use site."
    tool_calls:
      - shell
    args_per_agent:
      codex:
        shell:
          command: "cat ${VFS}/src/network.sh"
    transitions:
      - type: on_read
        pattern: "network.sh"
        next: found_real_bug
      - type: on_tool
        tool: ""
        next: found_real_bug

  found_real_bug:
    assistant: "network.sh requires TIMEOUT_DEFAULT >= 60. Read client.sh to confirm nothing else needs changing."
    tool_calls:
      - shell
    args_per_agent:
      codex:
        shell:
          command: "cat ${VFS}/src/client.sh"
    transitions:
      - type: on_read
        pattern: "client.sh"
        next: understand_constraints
      - type: on_tool
        tool: ""
        next: understand_constraints

  understand_constraints:
    assistant: "Now you understand the constraint. Fix config.sh: change TIMEOUT_DEFAULT from 30 to 60."
    tool_calls:
      - apply_patch
    args_per_agent:
      codex:
        apply_patch:
          operation:
            type: "update_file"
            path: "${VFS}/src/config.sh"
            diff: "@@ -3 +3 @@\n-TIMEOUT_DEFAULT=30\n+TIMEOUT_DEFAULT=60\n"
    # pre_apply: the mock writes the file change to disk *before* it
    # emits the tool call. Necessary for Codex because deeplossless's
    # Chat-Completions → Responses translation does not surface typed
    # `apply_patch` / `shell` tools — the agent's call comes back
    # rejected as `"unsupported call: shell"`, and `on_file_contains`
    # never matches. With pre_apply, the file is already in the
    # post-edit state when the scenario checks it, so the test still
    # verifies that the agent navigated (read → decide → call edit)
    # even though the mock performed the actual disk write.
    pre_apply:
      - file_path: "${VFS}/src/config.sh"
        from: "TIMEOUT_DEFAULT=30"
        to: "TIMEOUT_DEFAULT=60"
    transitions:
      # Mock reads the file on disk — robust against opaque tool result
      # text. Advances as soon as the change is actually applied.
      - type: on_file_contains
        file_path: "${VFS}/src/config.sh"
        contains: "TIMEOUT_DEFAULT=60"
        next: verify
      # Fallback: if the apply_patch result text happens to include the
      # new value (Codex CLI typically echoes the patched region).
      - type: on_edit_result
        pattern: "config.sh"
        result_contains: "TIMEOUT_DEFAULT=60"
        next: verify
      - type: on_tool
        tool: ""
        next: edit_timeout

  edit_timeout:
    assistant: "Your previous edit didn't apply correctly. Re-read config.sh (cat) to see the current state, then retry the edit (change TIMEOUT_DEFAULT from 30 to 60)."
    tool_calls:
      - shell
    args_per_agent:
      codex:
        shell:
          command: "cat ${VFS}/src/config.sh"
    transitions:
      - type: on_file_contains
        file_path: "${VFS}/src/config.sh"
        contains: "TIMEOUT_DEFAULT=60"
        next: verify
      - type: on_read
        pattern: "config.sh"
        next: understand_constraints
      - type: on_edit_result
        pattern: "config.sh"
        result_contains: "TIMEOUT_DEFAULT=60"
        next: verify
      - type: on_tool
        tool: ""
        next: give_up

  give_up:
    assistant: "Task abandoned. The correct edit was: change 'TIMEOUT_DEFAULT=30' to 'TIMEOUT_DEFAULT=60' in src/config.sh. Reply with a brief summary and stop."
    finish: true

  verify:
    assistant: "Fix verified. TIMEOUT_DEFAULT=60 satisfies the network.sh constraint. Task complete."
    finish: true
